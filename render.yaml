services:
  - type: web
    name: mental-health-app
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mental-health-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
    plan: free

databases:
  - name: mental-health-db
    databaseName: mental_health
    user: mental_health_user
    plan: free