services:
  - type: web
    name: mental-health-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres:postgres@localhost:5432/mental_health
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: mental-health-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist/browser -p $PORT
    envVars:
      - key: NG_APP_API_URL
        value: https://mental-health-backend.onrender.com/api