<div class="auth-page">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <span class="auth-icon">🧠</span>
      <h1>{{ mode === 'login' ? 'Welcome Back' : 'Create Your Account' }}</h1>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      <ng-container *ngIf="mode === 'login'; else signupForm">
        <label>
          <span>Username or Email</span>
          <input [(ngModel)]="identifier" name="identifier" autocomplete="username" required />
        </label>
        <div class="field-error" *ngIf="showFieldError(identifierValidationMessage, attemptedSubmit && !identifier.trim())">{{ identifierValidationMessage }}</div>
      </ng-container>

      <ng-template #signupForm>
        <label>
          <span>Username</span>
          <input [(ngModel)]="username" name="username" autocomplete="username" minlength="3" required />
        </label>
        <div class="field-error" *ngIf="showFieldError(usernameValidationMessage, attemptedSubmit || username.length > 0)">{{ usernameValidationMessage }}</div>

        <label>
          <span>Email</span>
          <input [(ngModel)]="email" name="email" type="email" autocomplete="email" required />
        </label>
        <div class="field-error" *ngIf="showFieldError(emailValidationMessage, attemptedSubmit || email.length > 0)">{{ emailValidationMessage }}</div>
      </ng-template>

      <label>
        <span>Password</span>
        <input [(ngModel)]="password" name="password" type="password" autocomplete="current-password" minlength="8" required />
      </label>
      <div class="field-error" *ngIf="showFieldError(passwordValidationMessage, attemptedSubmit || password.length > 0)">{{ passwordValidationMessage }}</div>

      <label *ngIf="mode === 'signup'">
        <span>Confirm Password</span>
        <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
      </label>
      <div class="field-error" *ngIf="mode === 'signup' && showFieldError(confirmPasswordValidationMessage, attemptedSubmit || confirmPassword.length > 0)">{{ confirmPasswordValidationMessage }}</div>

      <div class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button class="submit-btn" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Please wait...' : mode === 'login' ? 'Login' : 'Create Account' }}
      </button>
    </form>
  </div>
</div>
