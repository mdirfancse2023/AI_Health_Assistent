<nav class="navbar">
  <div class="nav-content">
    <h2>🧠 AI Mental Health Assistent</h2>

    <div class="nav-links">
      <ng-container *ngIf="authService.isAuthenticated()">
        <a 
          routerLink="/chat" 
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Chat
        </a>

        <a 
          routerLink="/dashboard" 
          routerLinkActive="active"
        >
          Dashboard
        </a>

        <span class="user-pill">{{ authService.currentUser()?.username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </ng-container>
      
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        <span *ngIf="isDarkMode">☀️</span>
        <span *ngIf="!isDarkMode">🌙</span>
      </button>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<footer class="app-footer">
  <p>Made by Md Irfan</p>
</footer>
