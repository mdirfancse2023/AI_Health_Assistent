<nav class="navbar">
  <div class="nav-content">
    <h2>🧠 AI Mental Health Assistent</h2>

    <div class="nav-links">
      <ng-container *ngIf="authService.isAuthenticated(); else guestLinks">
        <a 
          routerLink="/chat" 
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Chat
        </a>

        <a 
          routerLink="/dashboard" 
          routerLinkActive="active"
        >
          Dashboard
        </a>

        <span class="user-pill">{{ authService.currentUser()?.username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </ng-container>

      <ng-template #guestLinks>
        <a
          routerLink="/auth"
          [queryParams]="{ mode: 'login' }"
          [class.active]="isAuthMode('login')"
        >
          Login
        </a>

        <a
          routerLink="/auth"
          [queryParams]="{ mode: 'signup' }"
          [class.active]="isAuthMode('signup')"
        >
          Sign Up
        </a>
      </ng-template>
      
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        <span *ngIf="isDarkMode">☀️</span>
        <span *ngIf="!isDarkMode">🌙</span>
      </button>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<footer class="app-footer">
  <p>Made by Md Irfan</p>
</footer>
