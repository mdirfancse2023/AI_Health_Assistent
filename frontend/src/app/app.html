<nav class="navbar">
  <div class="nav-content">
    <h2>🧠 AI Mental Health Assistent</h2>

    <div class="nav-links">
      <ng-container *ngIf="authService.isAuthenticated(); else guestLinks">
        <a 
          routerLink="/chat" 
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Chat
        </a>

        <a 
          routerLink="/dashboard" 
          routerLinkActive="active"
        >
          Dashboard
        </a>

      </ng-container>

      <ng-template #guestLinks>
        <a
          routerLink="/auth"
          [queryParams]="{ mode: 'login' }"
          [class.active]="isAuthMode('login')"
        >
          Login
        </a>

        <a
          routerLink="/auth"
          [queryParams]="{ mode: 'signup' }"
          [class.active]="isAuthMode('signup')"
        >
          Sign Up
        </a>
      </ng-template>
    </div>
    
    <div class="header-actions">
      <ng-container *ngIf="authService.isAuthenticated()">
        <div class="user-menu-container">
          <button class="user-badge" (click)="toggleUserMenu()">
            {{ authService.currentUser()?.username?.charAt(0)?.toUpperCase() || 'U' }}
          </button>
          <div class="user-dropdown" *ngIf="isUserMenuOpen">
            <span class="dropdown-name">{{ authService.currentUser()?.username }}</span>
            <button class="dropdown-logout" (click)="logout()">Logout</button>
          </div>
        </div>
      </ng-container>

      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        <span *ngIf="isDarkMode">☀️</span>
        <span *ngIf="!isDarkMode">🌙</span>
      </button>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<footer class="app-footer">
  <p>Made by Md Irfan</p>
</footer>
