name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: mdirfancse2023
  GKE_CLUSTER: mental-health-cluster
  GKE_LOCATION: us-central1
  GCP_PROJECT: ai-mental-health-assistent
  WIF_PROVIDER: projects/720348842295/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@ai-mental-health-assistent.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.backend
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-backend:latest
          ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-backend:${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.frontend
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-frontend:latest
          ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-frontend:${{ github.sha }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ env.GCP_PROJECT }}
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v3
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_LOCATION }}
        project_id: ${{ env.GCP_PROJECT }}
        use_auth_provider: false

    - name: Update manifests
      run: |
        sed -i "s|PLACEHOLDER_OPENROUTER_API_KEY|${{ secrets.OPENROUTER_API_KEY }}|g" k8s/app.yaml
        if grep -q "PLACEHOLDER_LETSENCRYPT_EMAIL" k8s/cert-manager-clusterissuer.yaml; then
          if [ -z "${{ secrets.LETSENCRYPT_EMAIL }}" ]; then
            echo "Missing LETSENCRYPT_EMAIL GitHub secret"
            exit 1
          fi
          sed -i "s|PLACEHOLDER_LETSENCRYPT_EMAIL|${{ secrets.LETSENCRYPT_EMAIL }}|g" k8s/cert-manager-clusterissuer.yaml
        fi

    - name: Deploy to GKE
      run: |
        kubectl apply -f k8s/cert-manager-clusterissuer.yaml
        kubectl apply -f k8s/app.yaml
        kubectl set image deployment/backend backend=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-backend:${{ github.sha }}
        kubectl set image deployment/frontend frontend=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/mental-health-frontend:${{ github.sha }}
        kubectl rollout status deployment/backend --timeout=5m
        kubectl rollout status deployment/frontend --timeout=5m

    - name: Get service info
      run: |
        echo "=== Deployments ==="
        kubectl get deployments
        echo "=== Services ==="
        kubectl get svc
        echo "=== Ingress ==="
        kubectl get ingress
