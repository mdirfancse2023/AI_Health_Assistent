name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  GKE_CLUSTER: mental-health-cluster
  GKE_ZONE: us-central1-a
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.backend
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mental-health-backend:latest
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mental-health-backend:${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.frontend
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mental-health-frontend:latest
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/mental-health-frontend:${{ github.sha }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT }}
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
          --zone ${{ env.GKE_ZONE }} \
          --project ${{ env.GCP_PROJECT }}

    - name: Update manifests
      run: |
        sed -i "s|DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" k8s/app.yaml
        sed -i "s|PLACEHOLDER_OPENROUTER_API_KEY|${{ secrets.OPENROUTER_API_KEY }}|g" k8s/app.yaml
        sed -i "s|${{ github.sha }}|${{ github.sha }}|g" k8s/app.yaml

    - name: Deploy to GKE
      run: |
        kubectl apply -f k8s/app.yaml
        kubectl rollout status deployment/backend --timeout=5m
        kubectl rollout status deployment/frontend --timeout=5m

    - name: Get service info
      run: |
        echo "=== Deployments ==="
        kubectl get deployments
        echo "=== Services ==="
        kubectl get svc
        echo "=== Ingress ==="
        kubectl get ingress
